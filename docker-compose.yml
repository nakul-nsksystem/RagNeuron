services:
  qdrant:
    image: qdrant/qdrant
    container_name: rag-neuron-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./vectors/qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    restart: unless-stopped
    networks:
      - rag-network

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-neuron-api
    ports:
      - "8769:8769"
    volumes:
      - ./data:/app/data
      - ./vectors:/app/vectors
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
      - LLM_MODEL=qwen3.5-2b
      - LLM_TEMPERATURE=0.4
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=cpu
      - COLLECTION_NAME=tech_reports
      - API_PORT=8769
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - rag-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  rag-network:
    driver: bridge
